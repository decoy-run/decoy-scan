name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Module loads
        run: node -e "import('./index.mjs')"

      - name: CLI --version
        run: node bin/cli.mjs --version

      - name: CLI --help
        run: node bin/cli.mjs --help

      - name: CLI --json (no servers)
        run: node bin/cli.mjs --json --no-advisories --no-probe
        shell: bash
        env:
          HOME: /tmp/ci-empty
          USERPROFILE: C:\ci-empty

      - name: CLI --sarif (no servers)
        run: node bin/cli.mjs --sarif --no-advisories --no-probe
        shell: bash
        env:
          HOME: /tmp/ci-empty
          USERPROFILE: C:\ci-empty

      - name: CLI --no-color
        run: node bin/cli.mjs --no-color --no-advisories --no-probe
        shell: bash
        env:
          HOME: /tmp/ci-empty
          USERPROFILE: C:\ci-empty

      - name: CLI --quiet exits cleanly
        run: node bin/cli.mjs --quiet --no-advisories --no-probe
        shell: bash
        env:
          HOME: /tmp/ci-empty
          USERPROFILE: C:\ci-empty

      - name: Run test suite
        if: matrix.node >= 21
        run: npm test
